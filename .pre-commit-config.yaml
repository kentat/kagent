# ============================================================
# pre-commit: git commit のたびにローカルで自動実行
# インストール: pip install pre-commit && pre-commit install
# ============================================================

repos:
  # ─────────────────────────────────────────
  # 基本チェック（高速・軽量）
  # ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace        # 行末の空白を削除
      - id: end-of-file-fixer          # ファイル末尾の改行を統一
      - id: check-yaml                 # YAMLの構文チェック
      - id: check-json                 # JSONの構文チェック
      - id: check-merge-conflict       # マージコンフリクトマーカーの検出
      - id: detect-private-key         # 秘密鍵の検出
      - id: check-ast                  # Pythonの構文チェック

  # ─────────────────────────────────────────
  # シークレット検出（Yelp製・業界標準）
  # ─────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '.env.example'

  # ─────────────────────────────────────────
  # セキュリティスキャン（OWASP推奨）
  # ─────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ['-ll', '--skip', 'B101,B603,B607']
        exclude: 'docs/|agents/'

  # ─────────────────────────────────────────
  # コード品質（Ruff: flake8の100倍速い後継）
  # ─────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ['--select', 'E,W,F', '--ignore', 'E501,E402,F401']
        exclude: 'docs/|agents/'
