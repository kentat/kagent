# ============================================================
# Kenta Agent CI/CD パイプライン
# ============================================================

name: Security & Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────
  # Job 1: シークレット検出
  # ─────────────────────────────────────────
  secret-scan:
    name: 🔐 シークレット検出
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: detect-secrets ベースライン比較
        run: |
          pip install detect-secrets -q
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '.*\.lock$' \
            --exclude-files '\.env\.example$' \
            --exclude-files '.*\.md$' \
            --exclude-files '.*\.toml$'
          echo "✅ 新規シークレット検出なし"

      - name: APIキー直書きチェック
        run: |
          FOUND=$(grep -rn \
            "AIzaSy[A-Za-z0-9_-]\{10,\}\|sk-ant-api[A-Za-z0-9_-]\|GOCSPX-[A-Za-z0-9_-]\|ghp_[A-Za-z0-9]\{36,\}" \
            --include="*.py" . \
            | grep -v "\.git" | grep -v "^\s*#" || true)
          if [ -n "$FOUND" ]; then
            echo "❌ APIキーが検出されました:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ ハードコードなし"

  # ─────────────────────────────────────────
  # Job 2: セキュリティスキャン
  # ─────────────────────────────────────────
  security-scan:
    name: 🛡️ セキュリティスキャン
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip-audit（依存ライブラリ脆弱性）
        run: |
          pip install pip-audit -q
          pip-audit -r requirements.txt \
            --ignore-vuln GHSA-34jh-p97f-mpxf \
            --ignore-vuln PYSEC-2023-57 \
            || echo "⚠️ 脆弱性が見つかりました（確認してください）"

      - name: Bandit（Pythonコードセキュリティ）
        run: |
          pip install bandit -q
          HIGH=$(bandit -r . \
            --exclude ./.git,./docs,./agents,./.github \
            --skip B101,B603,B607,B320 \
            -ll --format json 2>/dev/null \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          h=[r for r in d.get('results',[]) if r.get('issue_severity')=='HIGH']
          print(len(h))
          " || echo "0")
          if [ "$HIGH" -gt "0" ]; then
            echo "❌ 高深刻度の問題: ${HIGH}件"
            bandit -r . --exclude ./.git,./docs,./agents,./.github --skip B101,B603,B607,B320 -ll
            exit 1
          fi
          echo "✅ High深刻度の問題なし"

  # ─────────────────────────────────────────
  # Job 3: コード品質
  # ─────────────────────────────────────────
  code-quality:
    name: 📋 コード品質
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 構文チェック
        run: |
          FAILED=0
          for f in main.py agent.py tools.py storage.py scheduler.py output.py config.py web_server.py; do
            [ -f "$f" ] && python3 -c "import ast; ast.parse(open('$f').read()); print('✅ $f')" || FAILED=1
          done
          [ "$FAILED" -eq "0" ] || exit 1

      - name: Ruff lint
        run: |
          pip install ruff -q
          ruff check . \
            --exclude docs,agents,.git,.github \
            --select E,W,F \
            --ignore E501,E402,F401 \
            --output-format=concise

      - name: ツール整合性チェック
        run: |
          python3 - << 'PYEOF'
          import re, sys
          with open("agent.py") as f:
              agent_tools = set(re.findall(r'"name":\s*"([^"]+)"', f.read()))
          with open("tools.py") as f:
              src = f.read()
              m = re.search(r'dispatch\s*=\s*\{([^}]+)\}', src, re.DOTALL)
              dispatched = set(re.findall(r'"([^"]+)":\s*\w+', m.group(1))) if m else set()
          missing = agent_tools - dispatched
          if missing:
              print(f"❌ dispatch未登録: {missing}")
              sys.exit(1)
          print(f"✅ ツール整合性OK（{len(agent_tools)}ツール）")
          PYEOF

      - name: Web認証チェック
        run: |
          python3 - << 'PYEOF'
          import re, sys
          src = open("web_server.py").read()
          pat = re.compile(
              r'@app\.(?:get|post|put|delete)\(["\']([^"\']+)["\']\)\n(?:async )?def \w+\(([^)]*\))',
              re.MULTILINE
          )
          bad = [p for p, a in pat.findall(src) if 'Depends(verify_credentials)' not in a]
          if bad:
              print(f"❌ 認証なしエンドポイント: {bad}")
              sys.exit(1)
          print("✅ 全エンドポイントに認証あり")
          PYEOF

  # ─────────────────────────────────────────
  # Job 4: ハードコーディングチェック
  # ─────────────────────────────────────────
  hardcode-check:
    name: 🚫 ハードコーディング
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: デフォルトパスワードチェック
        run: |
          FOUND=$(grep -rn \
            'os\.getenv.*"[A-Za-z0-9@#$%!_]\{20,\}"' \
            --include="*.py" . | grep -v "\.git" || true)
          if [ -n "$FOUND" ]; then
            echo "❌ デフォルト値に機密情報の疑い:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ デフォルト値チェックOK"

      - name: エラー詳細漏洩チェック
        run: |
          FOUND=$(grep -rn \
            'send_message.*str(e)\|reply_text.*str(e)' \
            --include="*.py" . || true)
          if [ -n "$FOUND" ]; then
            echo "❌ エラー詳細がユーザーに送信されています:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ エラー詳細漏洩なし"

      - name: bare exceptチェック
        run: |
          FOUND=$(grep -rn '^\s*except:\s*$' --include="*.py" . \
            | grep -v "\.git" || true)
          if [ -n "$FOUND" ]; then
            echo "❌ bare exceptが存在します:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ bare exceptなし"
